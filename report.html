<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>활동 보고</title>
<style>
  :root { --pink:#F35AA0; --ink:#2b2b2b; --sub:#8a8a8a; --line:#ececec; --bg:#FBF8F9;
          --gap:10px; --cols:1; }
  @media (min-width:640px)  { :root { --cols:2; } }
  @media (min-width:900px)  { :root { --cols:3; } }
  @media (min-width:1240px) { :root { --cols:4; } }

  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; background:var(--bg); color:var(--ink);
              font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }

  header { position:sticky; top:0; z-index:20; background:rgba(251,248,249,.95);
           backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .hwrap { max-width:1240px; margin:0 auto; padding:12px 16px 0; }
  h1 { font-size:19px; margin:0 0 2px; letter-spacing:-.02em; }
  .sub { font-size:13px; color:var(--sub); margin-bottom:10px; }

  .tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex:0 0 auto; border:0; cursor:pointer; font:inherit; font-weight:800; font-size:14px;
         padding:8px 16px; border-radius:999px; background:#efe9ec; color:#6b6b6b; }
  .tab.on { background:var(--pink); color:#fff; }

  /* 날짜 카드 — 오른쪽으로 계속 늘어나고 화살표로 넘긴다 */
  .daybar { display:flex; align-items:center; gap:6px; padding-bottom:10px; }
  .daystrip { display:flex; gap:8px; overflow-x:auto; scroll-snap-type:x proximity;
              flex:1; scrollbar-width:none; padding:2px; }
  .daystrip::-webkit-scrollbar { display:none; }
  .daycard { flex:0 0 auto; scroll-snap-align:start; cursor:pointer; border:1px solid var(--line);
             background:#fff; border-radius:13px; padding:8px 14px; min-width:78px; text-align:center;
             transition:transform .12s ease; }
  .daycard:active { transform:scale(.96); }
  .daycard .d { font-size:17px; font-weight:800; line-height:1.15; }
  .daycard .y { font-size:10px; color:var(--sub); }
  .daycard .n { font-size:10px; color:var(--sub); margin-top:2px; }
  .daycard.on { background:var(--pink); border-color:var(--pink); }
  .daycard.on .d, .daycard.on .y, .daycard.on .n { color:#fff; }
  .arrow { flex:0 0 auto; width:30px; height:30px; border-radius:50%; border:1px solid var(--line);
           background:#fff; color:#666; font-size:15px; cursor:pointer; display:flex;
           align-items:center; justify-content:center; }
  .arrow[disabled] { opacity:.3; cursor:default; }

  main { max-width:1240px; margin:0 auto; padding:18px 16px 40px; }
  .org { background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:16px; }
  .orghead { display:flex; align-items:center; gap:8px; margin-bottom:2px; }
  .orghead h3 { font-size:16px; margin:0; }
  .badge { font-size:11px; font-weight:800; color:var(--pink); background:#fdeef5;
           padding:3px 9px; border-radius:999px; }

  /* 프로그램(클래스)마다 가로 슬라이드 */
  .prog { margin-top:16px; }
  .proghead { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .proghead h4 { font-size:14px; margin:0; color:#333; flex:1; }
  .proghead .cnt { font-size:11px; color:var(--sub); }
  .slider { display:flex; gap:var(--gap); overflow-x:auto;
            scroll-snap-type:x mandatory; scrollbar-width:none; }
  .slider::-webkit-scrollbar { display:none; }
  .cell { position:relative; flex:0 0 calc((100% - var(--gap) * (var(--cols) - 1)) / var(--cols));
          scroll-snap-align:start; cursor:pointer; }
  .cell img { width:100%; aspect-ratio:1; object-fit:cover; display:block; border-radius:11px;
              background:#f0eaed; }
  .cell .play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
                pointer-events:none; }
  .cell .play span { width:44px; height:44px; border-radius:50%; background:rgba(0,0,0,.55);
                     color:#fff; font-size:18px; display:flex; align-items:center; justify-content:center;
                     padding-left:3px; }
  .cell .tag { position:absolute; right:6px; bottom:6px; background:rgba(0,0,0,.6); color:#fff;
               font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; pointer-events:none; }

  /* 로그인 */
  .gate { max-width:340px; margin:16vh auto; background:#fff; border:1px solid var(--line);
          border-radius:18px; padding:26px 22px; text-align:center; }
  .gate h1 { font-size:18px; margin:0 0 6px; }
  .gate p { font-size:13px; color:var(--sub); margin:0 0 16px; }
  .gate input { width:100%; font:inherit; font-size:16px; padding:12px 14px; text-align:center;
                border:1px solid var(--line); border-radius:12px; margin-bottom:10px; }
  .gate button { width:100%; font:inherit; font-weight:800; font-size:15px; color:#fff;
                 background:var(--pink); border:0; border-radius:12px; padding:13px; cursor:pointer; }
  .err { color:#d7443e; font-size:13px; min-height:18px; margin-top:8px; }
  .msg { text-align:center; color:var(--sub); padding:40px 20px; font-size:14px; line-height:1.7; }

  /* 크게 보기 */
  #box { position:fixed; inset:0; background:rgba(0,0,0,.93); display:none; z-index:50;
         align-items:center; justify-content:center; }
  #box img { max-width:96vw; max-height:88vh; object-fit:contain; }
  #box iframe { width:min(96vw,1100px); height:min(80vh,620px); border:0; border-radius:10px; background:#000; }
  #box .x { position:absolute; top:14px; right:18px; color:#fff; font-size:30px; cursor:pointer; }
  #box .nav { position:absolute; top:50%; transform:translateY(-50%); color:#fff; font-size:38px;
              cursor:pointer; padding:14px; user-select:none; opacity:.75; }
  #box .prev { left:4px; } #box .next { right:4px; }
  #box .cap { position:absolute; bottom:16px; left:0; right:0; text-align:center; color:#fff; font-size:13px; }

  @media print {
    header, #box, .arrow { display:none }
    .slider { display:grid; grid-template-columns:repeat(4,1fr); overflow:visible }
    .cell { flex:none } .org { break-inside:avoid }
  }
</style>
</head>
<body>

<div id="gate" class="gate">
  <h1>활동 보고</h1>
  <p>열람용 비밀번호를 입력해 주세요.</p>
  <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password">
  <button id="go">열기</button>
  <div id="err" class="err"></div>
</div>

<header id="head" hidden>
  <div class="hwrap">
    <h1>활동 보고</h1>
    <div class="sub" id="summary"></div>
    <div class="tabs" id="tabs"></div>
    <div class="daybar">
      <button class="arrow" id="dprev" aria-label="이전 날짜">&#8249;</button>
      <div class="daystrip" id="days"></div>
      <button class="arrow" id="dnext" aria-label="다음 날짜">&#8250;</button>
    </div>
  </div>
</header>
<main id="main" hidden></main>

<div id="box">
  <span class="x">&times;</span>
  <span class="nav prev">&#8249;</span>
  <img id="boximg" alt="">
  <iframe id="boxvid" allow="autoplay; fullscreen" allowfullscreen hidden></iframe>
  <span class="nav next">&#8250;</span>
  <div class="cap" id="boxcap"></div>
</div>

<script>
  // Apps Script 웹앱 — 앱과 같은 배포본을 쓴다.
  var API = "https://script.google.com/macros/s/AKfycbyV5LibT5DHLAIwujt8u8yjkyBtxpzSMF5T2aepcPdbgvQITCKc7kou4mlqcNxIvLKZ/exec";

  var el = function (id) { return document.getElementById(id); };

  /// 가로로 부드럽게 옮긴다.
  /// CSS scroll-behavior:smooth 와 scroll-snap 을 같이 쓰면 프로그램에서 건 스크롤이
  /// 스냅 엔진에 취소되거나(혹은 환경에 따라 아예 애니메이션이 안 돌아) 제자리에 머문다.
  /// 그래서 옮기는 동안만 스냅·부드러움을 끄고 직접 한 프레임씩 그린다.
  function glide(boxEl, target, done) {
    var keepSnap = boxEl.style.scrollSnapType, keepBehav = boxEl.style.scrollBehavior;
    boxEl.style.scrollSnapType = "none"; boxEl.style.scrollBehavior = "auto";

    function finish() {
      boxEl.scrollLeft = target;
      boxEl.style.scrollSnapType = keepSnap;
      boxEl.style.scrollBehavior = keepBehav;
      if (done) done();
    }
    // 탭이 백그라운드면 프레임이 안 돌아 영영 안 움직인다 — 그럴 땐 그냥 즉시 옮긴다.
    if (document.hidden || typeof requestAnimationFrame !== "function") { finish(); return; }
    var guard = setTimeout(finish, 900);   // 애니메이션이 멈춰버린 경우의 안전장치

    var from = boxEl.scrollLeft, dist = target - from, t0 = null, ms = 320;
    function frame(t) {
      if (t0 === null) t0 = t;
      var k = Math.min(1, (t - t0) / ms);
      var e = k < 0.5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2;   // easeInOutQuad
      boxEl.scrollLeft = from + dist * e;
      if (k < 1) requestAnimationFrame(frame);
      else { clearTimeout(guard); finish(); }
    }
    requestAnimationFrame(frame);
  }
  var DATA = null, REGION = "전체", DAY = null, SHOTS = [], AT = 0;

  var saved = localStorage.getItem("reportPw");
  if (saved) { el("pw").value = saved; openReport(saved, true); }

  el("go").addEventListener("click", function () { openReport(el("pw").value.trim(), false); });
  el("pw").addEventListener("keydown", function (e) { if (e.key === "Enter") el("go").click(); });

  function openReport(pw, quiet) {
    if (!pw) return;
    if (!quiet) el("err").textContent = "여는 중…";
    fetch(API, {
      method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "reportTree", secret: "artclasshub-2026", pw: pw })
    })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (!d.ok) {
          localStorage.removeItem("reportPw");
          el("err").textContent = d.message || "열지 못했어요.";
          return;
        }
        localStorage.setItem("reportPw", pw);
        DATA = d;
        el("gate").style.display = "none";
        el("head").hidden = false; el("main").hidden = false;
        render();
      })
      .catch(function () { el("err").textContent = "연결에 실패했어요. 잠시 뒤 다시 시도해 주세요."; });
  }

  /// 20260721 → {m:"7/21", y:"2026"}
  function dparts(folder) {
    var g = String(folder).replace(/[^0-9]/g, "");
    if (g.length !== 8) return { m: String(folder), y: "" };
    return { m: (+g.substr(4, 2)) + "/" + (+g.substr(6, 2)), y: g.substr(0, 4) };
  }

  function regionsOf(dates) {
    var set = [];
    dates.forEach(function (d) {
      d.orgs.forEach(function (o) { if (set.indexOf(o.region) < 0) set.push(o.region); });
    });
    set.sort(function (a, b) { return a === "기타" ? 1 : b === "기타" ? -1 : (a < b ? -1 : 1); });
    return ["전체"].concat(set);
  }

  /// 지금 지역에서 볼 수 있는 날짜만.
  function visibleDays() {
    return DATA.dates.filter(function (day) {
      return day.orgs.some(function (o) { return REGION === "전체" || o.region === REGION; });
    });
  }

  function render() {
    var tabs = el("tabs"); tabs.innerHTML = "";
    regionsOf(DATA.dates).forEach(function (r) {
      var b = document.createElement("button");
      b.className = "tab" + (r === REGION ? " on" : "");
      b.textContent = r;
      b.addEventListener("click", function () { REGION = r; DAY = null; render(); });
      tabs.appendChild(b);
    });

    var days = visibleDays();
    if (!days.length) {
      el("days").innerHTML = ""; el("summary").textContent = "";
      el("main").innerHTML = '<div class="msg">이 지역에는 아직 올라온 자료가 없어요.<br>'
        + '드라이브에 <b>날짜 ▸ 학교·기관명 ▸ 01프로그램명</b> 순서로 넣으면 여기에 나옵니다.</div>';
      return;
    }
    // 지역을 바꾸면 그 지역의 가장 최근 날짜로 맞춘다.
    if (!DAY || !days.some(function (d) { return d.folder === DAY; })) DAY = days[0].folder;

    var strip = el("days"); strip.innerHTML = "";
    days.forEach(function (day) {
      var p = dparts(day.folder);
      var n = 0;
      day.orgs.forEach(function (o) {
        if (REGION !== "전체" && o.region !== REGION) return;
        o.programs.forEach(function (pr) { n += pr.photos.length; });
      });
      var c = document.createElement("div");
      c.className = "daycard" + (day.folder === DAY ? " on" : "");
      c.innerHTML = '<div class="y">' + p.y + '</div><div class="d">' + p.m + '</div>'
        + '<div class="n">' + n + '개</div>';
      c.addEventListener("click", function () { DAY = day.folder; render(); });
      strip.appendChild(c);
    });
    setTimeout(function () {
      var on = strip.querySelector(".daycard.on");
      if (on) on.scrollIntoView({ inline: "center", block: "nearest" });
      updateArrows();
    }, 0);

    renderDay(days.filter(function (d) { return d.folder === DAY; })[0]);
  }

  function renderDay(day) {
    var orgs = day.orgs.filter(function (o) { return REGION === "전체" || o.region === REGION; });
    var total = 0, vids = 0;
    orgs.forEach(function (o) {
      o.programs.forEach(function (p) {
        total += p.photos.length;
        vids += p.photos.filter(function (x) { return x.kind === "video"; }).length;
      });
    });
    var p = dparts(day.folder);
    el("summary").textContent = p.y + "." + p.m.replace("/", ".") + " · " + orgs.length + "개 기관 · 사진 "
      + (total - vids) + "장" + (vids ? " · 영상 " + vids + "개" : "");

    var main = el("main"); main.innerHTML = "";
    orgs.forEach(function (o) {
      var card = document.createElement("div"); card.className = "org";
      card.innerHTML = '<div class="orghead"><h3>' + esc(o.org) + '</h3>'
        + '<span class="badge">' + esc(o.region) + '</span></div>';
      o.programs.forEach(function (pr) { card.appendChild(programSlider(day, o, pr)); });
      main.appendChild(card);
    });
  }

  /// 프로그램 하나 = 가로 슬라이드 한 줄. 화면 크기에 따라 1·2·3·4개씩 보인다.
  function programSlider(day, org, pr) {
    var wrap = document.createElement("div"); wrap.className = "prog";

    var head = document.createElement("div"); head.className = "proghead";
    var v = pr.photos.filter(function (x) { return x.kind === "video"; }).length;
    head.innerHTML = "<h4>" + esc(pr.title) + "</h4>"
      + '<span class="cnt">' + (pr.photos.length - v) + "장" + (v ? " · 영상 " + v : "") + "</span>";
    var back = document.createElement("button"); back.className = "arrow"; back.innerHTML = "&#8249;";
    var fwd = document.createElement("button"); fwd.className = "arrow"; fwd.innerHTML = "&#8250;";
    head.appendChild(back); head.appendChild(fwd);
    wrap.appendChild(head);

    var slider = document.createElement("div"); slider.className = "slider";
    pr.photos.forEach(function (ph) {
      var cell = document.createElement("div"); cell.className = "cell";
      var im = document.createElement("img");
      im.src = ph.thumb; im.loading = "lazy"; im.alt = ph.name;
      im.addEventListener("error", function () { im.style.visibility = "hidden"; });
      cell.appendChild(im);
      if (ph.kind === "video") {
        var b = document.createElement("div"); b.className = "play"; b.innerHTML = "<span>&#9654;</span>";
        cell.appendChild(b);
        var t = document.createElement("div"); t.className = "tag"; t.textContent = "영상";
        cell.appendChild(t);
      }
      cell.addEventListener("click", function () {
        SHOTS = pr.photos; AT = pr.photos.indexOf(ph);
        show(dparts(day.folder).m + " · " + org.org + " · " + pr.title);
      });
      slider.appendChild(cell);
    });
    wrap.appendChild(slider);

    // 한 번에 보이는 만큼 넘긴다.
    // scroll-snap이 켜져 있으면 프로그램에서 건 스크롤을 스냅 엔진이 되돌려버리는 브라우저가 있다.
    // 옮기는 동안만 스냅을 끄고, 끝나면 되돌린다.
    function page(dir) {
      var max = slider.scrollWidth - slider.clientWidth;
      glide(slider, Math.max(0, Math.min(max, slider.scrollLeft + dir * slider.clientWidth)), sync);
    }
    back.addEventListener("click", function () { page(-1); });
    fwd.addEventListener("click", function () { page(1); });
    function sync() {
      var end = slider.scrollWidth - slider.clientWidth - 2;
      back.disabled = slider.scrollLeft <= 2;
      fwd.disabled = slider.scrollLeft >= end;
      // 한 화면에 다 들어오면 화살표를 숨긴다.
      var hide = slider.scrollWidth <= slider.clientWidth + 2;
      back.style.display = fwd.style.display = hide ? "none" : "";
    }
    slider.addEventListener("scroll", sync);
    window.addEventListener("resize", sync);
    setTimeout(sync, 60);
    return wrap;
  }

  // 날짜 줄 화살표
  function updateArrows() {
    var s = el("days");
    var end = s.scrollWidth - s.clientWidth - 2;
    el("dprev").disabled = s.scrollLeft <= 2;
    el("dnext").disabled = s.scrollLeft >= end;
    var hide = s.scrollWidth <= s.clientWidth + 2;
    el("dprev").style.visibility = el("dnext").style.visibility = hide ? "hidden" : "";
  }
  function pageDays(dir) {
    var s = el("days");
    var max = s.scrollWidth - s.clientWidth;
    var step = Math.max(240, s.clientWidth * 0.8);
    glide(s, Math.max(0, Math.min(max, s.scrollLeft + dir * step)), updateArrows);
  }
  el("dprev").addEventListener("click", function () { pageDays(-1); });
  el("dnext").addEventListener("click", function () { pageDays(1); });
  el("days").addEventListener("scroll", updateArrows);
  window.addEventListener("resize", updateArrows);

  // 크게 보기
  var box = el("box");
  function show(cap) {
    var it = SHOTS[AT], img = el("boximg"), vid = el("boxvid");
    if (it.kind === "video") {
      img.hidden = true; img.removeAttribute("src");
      vid.hidden = false; vid.src = it.full;
    } else {
      vid.hidden = true; vid.removeAttribute("src");   // 재생 중이던 영상을 확실히 멈춘다
      img.hidden = false; img.src = it.full;
    }
    el("boxcap").textContent = cap + "  (" + (AT + 1) + "/" + SHOTS.length + ")";
    box.style.display = "flex";
    box.dataset.cap = cap;
  }
  function closeBox() {
    box.style.display = "none";
    el("boxvid").removeAttribute("src");
    el("boximg").removeAttribute("src");
  }
  function step(d) {
    if (!SHOTS.length) return;
    AT = (AT + d + SHOTS.length) % SHOTS.length;
    show(box.dataset.cap || "");
  }
  box.querySelector(".x").addEventListener("click", closeBox);
  box.querySelector(".prev").addEventListener("click", function (e) { e.stopPropagation(); step(-1); });
  box.querySelector(".next").addEventListener("click", function (e) { e.stopPropagation(); step(1); });
  box.addEventListener("click", function (e) { if (e.target === box) closeBox(); });
  document.addEventListener("keydown", function (e) {
    if (box.style.display !== "flex") return;
    if (e.key === "Escape") closeBox();
    if (e.key === "ArrowRight") step(1);
    if (e.key === "ArrowLeft") step(-1);
  });

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
</script>
</body>
</html>
