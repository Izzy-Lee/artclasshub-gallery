<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>수업 페이스 보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #1b1030; color: #fff; overflow: hidden; height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  #wait { text-align: center; color: #cbb8ee; font-size: 3vw; line-height: 1.6; }
  #board { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 3vh; }
  .stage { font-size: 5.4vw; font-weight: 900; letter-spacing: -1px; text-align: center; padding: 0 4vw; }
  .timer { font-size: 16vw; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; }
  .timer.warn { color: #FFD23F; }
  .paused .timer { opacity: .45; }
  .pausedTag { font-size: 3vw; color: #FFD23F; font-weight: 800; }

  .gaugeWrap { width: 78vw; }
  .gaugeLabel { display: flex; justify-content: space-between; font-size: 2.4vw; font-weight: 800; color: #cbb8ee; margin-bottom: 1vh; }
  .gaugeLabel .cnt { color: #fff; }
  .gauge { height: 7vh; background: #2a1a4a; border-radius: 99px; overflow: hidden; position: relative; box-shadow: inset 0 0 0 2px rgba(255,255,255,.08); }
  .fill { height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, #E84C88, #FFC24B);
          transition: width .6s cubic-bezier(.2,.8,.2,1); }
  .fill.pulse { animation: pulse .5s ease 2; }
  @keyframes pulse { 50% { filter: brightness(1.5); box-shadow: 0 0 40px rgba(255,210,63,.9); } }

  /* 그림책 모드: 타이머 작게, 위에서부터 채움 */
  #board.book { justify-content: flex-start; gap: 1.6vh; padding: 3vh 0 2vh; }
  #board.book .stage { font-size: 3.4vw; }
  #board.book .timer { font-size: 4vw; opacity: .6; }

  /* 멘티식 응답 벽 — 한 단계(설문) 페이지에 학생 글 카드(최대 24명) */
  .wall { display: none; width: 95vw; flex: 1; min-height: 0; overflow: hidden;
          grid-template-columns: repeat(6, 1fr); grid-auto-rows: 1fr; gap: 1vw; align-content: start; }
  #board.book .wall { display: grid; }
  .card { background: #241640; border-radius: 14px; padding: 1vh 0.9vw; min-height: 0; overflow: hidden;
          display: flex; flex-direction: column; gap: 0.5vh; box-shadow: 0 2px 8px rgba(0,0,0,.22); }
  .card.cur { box-shadow: inset 0 0 0 2px rgba(255,210,63,.4); }
  .card .nm { font-size: 1.35vw; font-weight: 900; color: #FFC24B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .tx { font-size: 1.55vw; font-weight: 700; color: #fff; line-height: 1.3;
              display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .card.pending .tx { color: #8a79b3; font-weight: 600; }
  .card.done { background: #16351f; box-shadow: inset 0 0 0 2px rgba(74,222,128,.5); }
  .card.done .nm { color: #a3e635; }
  /* 인원이 적을 때는 카드를 키운다(2~3열) */
  .wall.few { grid-template-columns: repeat(3, 1fr); }
  .wall.few .nm { font-size: 2vw; }
  .wall.few .tx { font-size: 2.3vw; -webkit-line-clamp: 5; }
  /* 전체 이야기 페이지: 글이 길어 4열 + 더 많은 줄 */
  .wall.story { grid-template-columns: repeat(4, 1fr); }
  .wall.story .tx { font-size: 1.35vw; -webkit-line-clamp: 8; }
  .wall.story.few { grid-template-columns: repeat(2, 1fr); }
  /* 완성 축하(익명): 이름 대신 큰 완성 카운트 */
  .wall.summary { display: flex; align-items: center; justify-content: center; }
  .bigcount { font-size: 9vw; font-weight: 900; color: #a3e635; text-align: center; text-shadow: 0 4px 30px rgba(0,0,0,.4); }

  /* 축하 오버레이 */
  /* canvas-confetti가 자체 캔버스를 z-index:100으로 띄우므로, 메시지는 그보다 위(9999)에 둔다. */
  #celebrate { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
               flex-direction: column; gap: 2vh; z-index: 9999; text-align: center;
               background: radial-gradient(circle at center, rgba(43,26,74,.55), rgba(27,16,48,.9)); }
  #celebrate .big { font-size: 7vw; font-weight: 900; text-shadow: 0 4px 30px rgba(0,0,0,.5); padding: 0 5vw; }
  #celebrate.finale .big { font-size: 9vw; color: #FFD23F; }
  #celebrate .sub { font-size: 3vw; color: #ffd; font-weight: 800; }
  #confetti { position: fixed; inset: 0; z-index: 15; pointer-events: none; }
</style>
</head>
<body>
  <div id="wait">수업이 시작되면 여기에<br>단계·타이머·진행률이 표시됩니다 🎨</div>
  <div id="board">
    <div id="stageBox" class="stage">—</div>
    <div id="tmr" class="timer">0:00</div>
    <div id="pausedTag" class="pausedTag" style="display:none">⏸ 잠깐 멈춤</div>
    <div class="gaugeWrap" id="gaugeWrap">
      <div class="gaugeLabel"><span id="stageDone">이 단계 완료</span><span class="cnt" id="cnt">0 / 0</span></div>
      <div class="gauge"><div id="fill" class="fill"></div></div>
    </div>
    <!-- 멘티식 응답 벽: 이 단계(설문) 한 페이지에 학생들의 글을 카드로(최대 24명) -->
    <div class="wall" id="wall"></div>
  </div>
  <canvas id="confetti"></canvas>
  <div id="celebrate"><div class="big" id="celBig"></div><div class="sub" id="celSub"></div></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="config.js"></script>
  <script>
  (function () {
    "use strict";
    firebase.initializeApp(window.FIREBASE_CONFIG);
    const db = firebase.firestore();
    // 0=주인공, 1~4=그리기 스프레드, 5=완성 축하, 6=소감, 7=전체 이야기. 선생님 화살표로 순서대로 이동.
    const STAGES = ["주인공", "표지", "1-2쪽", "3-4쪽", "5-6쪽", "마무리", "소감", "전체 이야기"];
    const LAST = STAGES.length - 1;

    const params = new URLSearchParams(location.search);
    const classCode = (params.get("class") || "").trim().toUpperCase();

    let pace = null, books = [];
    let lastCelebrateAt = 0;
    let lastMilestone = 0;
    let audioMuted = false;
    let lastStageShown = -1;   // '완성 축하' 페이지 진입 시 1회 폭죽

    const $ = function (id) { return document.getElementById(id); };

    if (!classCode) { $("wait").textContent = "board.html?class=반코드 형식으로 열어주세요."; return; }

    // ---- 집계 ----
    function denom() { return (pace && pace.classSize) ? pace.classSize : books.length; }
    function completedForStage(k) {
      if (k >= 3) return books.filter(function (b) { return b.status === "완성"; }).length;
      return books.filter(function (b) { return (b.maxSpreadIndex || 0) >= k + 1; }).length;
    }
    function durationSec(p) { const i = p.stageIndex || 0; return ((p.durationsMin && p.durationsMin[i]) || 50) * 60; }
    function remaining(p) {
      if (!p) return 0;
      // 앱 '라이브수업' 수업 타이머 미러(kind:"class") — endsAtMs 기준 카운트다운.
      if (p.kind === "class") {
        if (p.paused) return p.pausedRemainingSec || 0;
        return Math.max(0, Math.round(((p.endsAtMs || Date.now()) - Date.now()) / 1000));
      }
      if (p.paused) return p.pausedRemainingSec || 0;
      return Math.max(0, durationSec(p) - Math.floor((Date.now() - (p.stageStartedAtMs || Date.now())) / 1000));
    }
    function fmt(s) { return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0"); }
    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }
    var STAGE_SUB = ["캐릭터 이름", "제목", "시작 장면", "중간 장면", "끝 장면", "완성 축하", "소감", "전체 이야기"];
    // 그리기 단계(1~4)의 글 필드. stage-1로 참조.
    var STAGE_ROLE = ["title", "sceneStart", "sceneMiddle", "sceneEnd"];
    // 한 학생 카드에 보여줄 줄들(단계별). 빈 배열이면 '쓰는 중'.
    function cardLines(b, stage) {
      if (stage === 0) {  // 주인공(캐릭터 이름) — 문답 답변 hero(+종류)
        var hero = (b.answers && b.answers.hero) || "";
        var kind = (b.answers && b.answers.heroKind) || "";
        if (!hero) return [];
        return [kind ? (hero + " (" + kind + ")") : hero];
      }
      if (stage >= 1 && stage <= 4) {
        var role = STAGE_ROLE[stage - 1];
        var t = stage === 1 ? (b.title || (b.pageStories && b.pageStories.title) || "")
              : ((b.pageStories && b.pageStories[role]) || (b.answers && b.answers[role]) || "");
        return t ? [t] : [];
      }
      if (stage === 5) {  // 완성 축하 + 아이별 완성 여부
        return [b.status === "완성" ? "완성했어요! 🎉" : "아직 그리는 중…"];
      }
      if (stage === 6) {  // 소감(성찰 카드: fav·hard·next)
        var r = b.reflections || {};
        var out = [];
        if (r.fav) out.push("👍 " + r.fav);
        if (r.hard) out.push("😅 " + r.hard);
        if (r.next) out.push("➡️ " + r.next);
        return out;
      }
      // 7: 전체 이야기 — 정해진 전체 글 또는 장면들을 이어붙임
      var story = b.storyText || [b.title,
        b.pageStories && b.pageStories.sceneStart,
        b.pageStories && b.pageStories.sceneMiddle,
        b.pageStories && b.pageStories.sceneEnd].filter(Boolean).join(" ");
      return story ? [story] : [];
    }
    // 멘티식 응답 벽: 지금 단계(설문) 한 페이지에 학생들의 글을 카드로(최대 24명).
    function renderWall() {
      var el = $("wall");
      if (!(pace && pace.active && pace.kind !== "class")) { el.innerHTML = ""; return; }
      var stage = pace.stageIndex || 0;
      var showNames = !!pace.showNames;   // 기본 숨김(익명), 선생님이 켜면 실명
      var all = books.filter(function (b) { return b.studentName; });
      // 완성 축하 + 익명 → 이름 대신 큰 완성 카운트.
      if (stage === 5 && !showNames) {
        var done = all.filter(function (b) { return b.status === "완성"; }).length;
        var total = (pace && pace.classSize) ? pace.classSize : all.length;
        el.className = "wall summary";
        el.innerHTML = '<div class="bigcount">🎉 ' + done + " / " + total + " 완성!</div>";
        return;
      }
      var items = all.sort(function (a, c) { return (a.studentName || "").localeCompare(c.studentName || ""); }).slice(0, 24);
      el.className = "wall" + (items.length <= 6 ? " few" : "") + (stage === 7 ? " story" : "");
      if (!items.length) { el.innerHTML = '<div class="card pending"><div class="tx">아직 시작한 학생이 없어요</div></div>'; return; }
      el.innerHTML = items.map(function (b) {
        var lines = cardLines(b, stage);
        var done = b.status === "완성";
        var body = lines.length ? lines.map(esc).join("<br>") : "✏️ 쓰는 중…";
        var nm = showNames ? ('<div class="nm">' + esc(b.studentName) + (done ? " ✅" : "") + "</div>") : "";
        return '<div class="card' + (lines.length ? "" : " pending") + (stage === 5 && done ? " done" : "") + '">'
             + nm + '<div class="tx">' + body + "</div></div>";
      }).join("");
    }

    // ---- 구독 ----
    db.collection("pace_sessions").doc(classCode).onSnapshot(function (doc) {
      pace = doc.exists ? doc.data() : null;
      audioMuted = !!(pace && pace.muted);
      if (pace && pace.celebrateAt && pace.celebrateAt !== lastCelebrateAt) {
        lastCelebrateAt = pace.celebrateAt;
        runCelebration(pace.celebratedStage || 0, !!pace.celebrateFinale, pace.finaleMessage);
      }
      renderStatic();
      renderWall();
    });
    db.collection("storybooks").where("classCode", "==", classCode).onSnapshot(function (snap) {
      books = snap.docs.map(function (d) { return d.data(); });
      renderWall();
    });

    // ---- 렌더 (매초 갱신은 텍스트/게이지만) ----
    function renderStatic() {
      const active = pace && pace.active;
      $("wait").style.display = active ? "none" : "block";
      $("board").style.display = active ? "flex" : "none";
      if (!active) return;
      const isClass = pace.kind === "class";
      // 단일 게이지는 숨김 — 그림책 모드는 아래 멘티식 응답 벽이 대신 보여준다.
      $("gaugeWrap").style.display = "none";
      if (isClass) {
        $("stageBox").innerHTML = "⏰ <b>" + (pace.classLabel || "수업 시간") + "</b>";
      } else {
        const i = pace.stageIndex || 0;
        // 한 설문 당 1페이지: 단계 이름 + 부제 + 페이지 표시(5/7)
        const emoji = i === 0 ? "🦸" : (i === 5 ? "🎉" : (i >= 6 ? "📖" : "🎨"));
        const sub = STAGE_SUB[i] && STAGE_SUB[i] !== STAGES[i] ? " · " + STAGE_SUB[i] : "";
        $("stageBox").innerHTML = emoji + " <b>" + STAGES[i] + "</b>" + sub
          + ' <span style="opacity:.5;font-size:.6em">(' + (i + 1) + " / " + STAGES.length + ")</span>";
        // '완성 축하' 페이지(5)로 넘어오면 1회 폭죽.
        if (i === 5 && lastStageShown !== 5) { blast(true); chime(true); }
        lastStageShown = i;
      }
      $("board").className = (isClass ? "" : "book") + (pace.paused ? " paused" : "");
      $("board").style.display = "flex";
      $("pausedTag").style.display = pace.paused ? "block" : "none";
    }
    setInterval(function () {
      if (!pace || !pace.active) return;
      const rem = remaining(pace);
      const t = $("tmr"); t.textContent = fmt(rem); t.className = "timer " + (rem <= 60 ? "warn" : "");
      if (pace.kind === "class") return;   // 수업 타이머 모드는 진행 게이지 없음
      const total = denom(), done = completedForStage(pace.stageIndex || 0);
      const pct = total > 0 ? Math.min(100, Math.round(done / total * 100)) : 0;
      $("cnt").textContent = done + " / " + total + " 완료";
      const fill = $("fill"); fill.style.width = pct + "%";
      // 마일스톤 펄스(50%·80% 도달 시)
      const ms = pct >= 80 ? 80 : (pct >= 50 ? 50 : 0);
      if (ms > lastMilestone) { fill.classList.remove("pulse"); void fill.offsetWidth; fill.classList.add("pulse"); }
      lastMilestone = (pct < 50) ? 0 : ms;
    }, 400);

    // ---- 축하 연출 ----
    function runCelebration(stageK, finale, finaleMsg) {
      const cel = $("celebrate");
      cel.className = finale ? "finale" : "";
      $("celBig").textContent = finale
        ? (finaleMsg || "🍬 전원 완성! 사탕 타임! 🍬")
        : (STAGES[stageK] + " 완주! 우리 반 최고! 🎉");
      $("celSub").textContent = finale ? "" : "다음 쪽으로 넘어가요";
      cel.style.display = "flex";
      chime(finale);
      blast(finale);
      setTimeout(function () { cel.style.display = "none"; }, finale ? 6000 : 4200);
    }
    function blast(finale) {
      const end = Date.now() + (finale ? 5000 : 2500);
      (function frame() {
        confetti({ particleCount: finale ? 12 : 7, spread: 70, startVelocity: 45,
                   origin: { x: Math.random(), y: Math.random() * 0.3 } });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
      confetti({ particleCount: finale ? 220 : 130, spread: 120, startVelocity: 55, origin: { y: 0.6 } });
    }
    let ac = null;
    function chime(finale) {
      if (audioMuted) return;
      try {
        ac = ac || new (window.AudioContext || window.webkitAudioContext)();
        if (ac.state === "suspended") ac.resume();
        const notes = finale ? [523, 659, 784, 1047, 1319] : [523, 659, 784, 1047];
        const now = ac.currentTime;
        notes.forEach(function (f, i) {
          const o = ac.createOscillator(), g = ac.createGain();
          o.type = "triangle"; o.frequency.value = f; o.connect(g); g.connect(ac.destination);
          const t = now + i * 0.12;
          g.gain.setValueAtTime(0.0001, t);
          g.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
          o.start(t); o.stop(t + 0.37);
        });
      } catch (e) {}
    }
    // 오토플레이 정책: 첫 클릭에서 오디오 해제
    document.addEventListener("click", function () { if (ac && ac.state === "suspended") ac.resume(); });
  })();
  </script>
</body>
</html>
