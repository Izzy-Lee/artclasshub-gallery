<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>수업 페이스 보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #1b1030; color: #fff; overflow: hidden;
    display: flex; flex-direction: column; height: 100vh;
  }
  .setup {
    margin: auto; background: #2a1a4a; padding: 32px 36px; border-radius: 20px;
    text-align: center; max-width: 520px;
  }
  .setup h1 { font-size: 26px; margin-bottom: 8px; }
  .setup p { color: #cbb8ee; margin-bottom: 20px; font-size: 15px; }
  .setup input {
    font-size: 20px; padding: 12px 16px; border-radius: 12px; border: none;
    width: 200px; text-align: center; text-transform: uppercase; margin-bottom: 16px;
  }
  .mins { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .mins label { font-size: 13px; color: #cbb8ee; display: flex; flex-direction: column; gap: 4px; }
  .mins input { width: 66px; font-size: 16px; padding: 8px; text-transform: none; margin: 0; }
  button {
    font-family: inherit; cursor: pointer; border: none; border-radius: 12px;
    font-weight: 800; color: #fff; background: #E84C88; padding: 12px 22px; font-size: 17px;
  }
  button.ghost { background: rgba(255,255,255,.14); }
  button:active { transform: translateY(1px); }

  .stage { flex: 0 0 auto; text-align: center; padding: 3vh 20px 0; }
  .stage .title { font-size: 5.2vw; font-weight: 900; letter-spacing: -1px; }
  .timer { font-size: 15vw; font-weight: 900; line-height: 1.05; font-variant-numeric: tabular-nums;
           text-align: center; margin: 1vh 0; }
  .timer.warn { color: #FFD23F; }
  .paused .timer { opacity: .5; }
  .pausedTag { font-size: 3vw; color: #FFD23F; font-weight: 800; text-align: center; }

  .funnel { flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
            gap: 2.4vw; flex-wrap: wrap; padding: 0 4vw 2vh; }
  .cell { background: #2a1a4a; border-radius: 18px; padding: 2vh 2.6vw; text-align: center; min-width: 15vw; }
  .cell .lbl { font-size: 2vw; color: #cbb8ee; font-weight: 700; }
  .cell .num { font-size: 5vw; font-weight: 900; }
  .cell .num small { font-size: 2.4vw; color: #9a86c4; }
  .cell.done { background: #3a2a1a; }
  .cell.done .num { color: #FFD23F; }

  .controls { flex: 0 0 auto; display: flex; gap: 8px; align-items: center; justify-content: center;
              padding: 12px; background: rgba(0,0,0,.25); flex-wrap: wrap; }
  .controls button { padding: 10px 16px; font-size: 15px; }
  .controls .sp { flex: 1 1 20px; }
  .hint { color: #9a86c4; font-size: 12px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script>
  (function () {
    "use strict";
    firebase.initializeApp(window.FIREBASE_CONFIG);
    const db = firebase.firestore();
    const STAGES = ["표지", "1-2쪽", "3-4쪽", "5-6쪽", "마무리"];
    const root = document.getElementById("root");

    const params = new URLSearchParams(location.search);
    let classCode = (params.get("class") || "").trim().toUpperCase();

    let pace = null;      // pace_sessions 문서
    let books = [];       // storybooks (익명 집계용)
    let advancing = false;
    let unsubPace = null, unsubBooks = null;

    function paceRef() { return db.collection("pace_sessions").doc(classCode); }
    function durationSec(p) { const i = p.stageIndex || 0; return ((p.durationsMin && p.durationsMin[i]) || 50) * 60; }
    function remaining(p) {
      if (!p) return 0;
      if (p.paused) return p.pausedRemainingSec || 0;
      return Math.max(0, durationSec(p) - Math.floor((Date.now() - (p.stageStartedAtMs || Date.now())) / 1000));
    }
    function fmt(s) { return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0"); }

    // ---- 컨트롤 (교사 노트북) ----
    function startSession(durations) {
      paceRef().set({
        active: true, stageIndex: 0, stageStartedAtMs: Date.now(),
        durationsMin: durations, paused: false, pausedRemainingSec: 0,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }
    function goStage(delta) {
      if (!pace) return;
      const i = Math.min(STAGES.length - 1, Math.max(0, (pace.stageIndex || 0) + delta));
      paceRef().set({ stageIndex: i, stageStartedAtMs: Date.now(), paused: false, pausedRemainingSec: 0,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
    }
    function togglePause() {
      if (!pace) return;
      if (pace.paused) {
        const startMs = Date.now() - (durationSec(pace) - (pace.pausedRemainingSec || 0)) * 1000;
        paceRef().set({ paused: false, stageStartedAtMs: startMs }, { merge: true });
      } else {
        paceRef().set({ paused: true, pausedRemainingSec: remaining(pace) }, { merge: true });
      }
    }
    function adjustMin(delta) {
      if (!pace) return;
      const d = (pace.durationsMin || [50,50,50,50,50]).slice();
      const i = pace.stageIndex || 0;
      d[i] = Math.max(1, (d[i] || 50) + delta);
      paceRef().set({ durationsMin: d }, { merge: true });
    }
    function endSession() { paceRef().set({ active: false }, { merge: true }); }

    // ---- 구독 ----
    function subscribe() {
      if (unsubPace) unsubPace();
      if (unsubBooks) unsubBooks();
      unsubPace = paceRef().onSnapshot(function (doc) { pace = doc.exists ? doc.data() : null; render(); });
      unsubBooks = db.collection("storybooks").where("classCode", "==", classCode)
        .onSnapshot(function (snap) { books = snap.docs.map(function (d) { return d.data(); }); render(); });
    }

    // ---- 매초 틱: 타이머 글자만 갱신 + 자동 전환 (전체 DOM 재생성 금지 → 입력 안 끊김) ----
    setInterval(function () {
      if (!pace || !pace.active) return;
      if (!pace.paused && (pace.stageIndex || 0) < STAGES.length - 1 && remaining(pace) <= 0 && !advancing) {
        advancing = true;
        goStage(1);
        setTimeout(function () { advancing = false; }, 1500);
      }
      const el = document.getElementById("tmr");
      if (el) {
        const rem = remaining(pace);
        el.textContent = fmt(rem);
        el.className = "timer " + (rem <= 60 ? "warn" : "");
      }
    }, 300);

    // ---- 렌더 ----
    function render() {
      if (!classCode) return renderSetup();
      if (!pace || !pace.active) return renderSetup();

      const i = pace.stageIndex || 0;
      const rem = remaining(pace);
      const total = books.length;
      const reached = function (n) { return books.filter(function (b) { return (b.maxSpreadIndex || 0) >= n; }).length; };
      const done = books.filter(function (b) { return b.status === "완성"; }).length;
      const cells = [
        { lbl: "표지 완료", num: reached(1) },
        { lbl: "1-2쪽 완료", num: reached(2) },
        { lbl: "3-4쪽 완료", num: reached(3) },
        { lbl: "완성", num: done, done: true }
      ];
      root.innerHTML =
        '<div class="stage ' + (pace.paused ? "paused" : "") + '">' +
          '<div class="title">🎨 지금은 <b>' + STAGES[i] + '</b> ' + (i === 4 ? "하는" : "그리는") + ' 시간</div>' +
          '<div class="timer ' + (rem <= 60 ? "warn" : "") + '" id="tmr">' + fmt(rem) + '</div>' +
          (pace.paused ? '<div class="pausedTag">⏸ 잠깐 멈춤</div>' : '') +
        '</div>' +
        '<div class="funnel">' +
          cells.map(function (c) {
            return '<div class="cell ' + (c.done ? "done" : "") + '"><div class="lbl">' + c.lbl +
              '</div><div class="num">' + c.num + ' <small>/ ' + total + '</small></div></div>';
          }).join("") +
        '</div>' +
        '<div class="controls">' +
          '<button class="ghost" onclick="PACE.go(-1)">◀ 이전</button>' +
          '<button class="ghost" onclick="PACE.pause()">' + (pace.paused ? "▶ 계속" : "⏸ 멈춤") + '</button>' +
          '<button class="ghost" onclick="PACE.min(-5)">−5분</button>' +
          '<button class="ghost" onclick="PACE.min(5)">＋5분</button>' +
          '<button onclick="PACE.go(1)">다음 ▶</button>' +
          '<span class="sp"></span>' +
          '<span class="hint">' + classCode + ' · 학생 앱과 자동 동기화</span>' +
          '<button class="ghost" onclick="PACE.end()">종료</button>' +
        '</div>';
    }

    function renderSetup() {
      root.innerHTML =
        '<div class="setup">' +
          '<h1>수업 페이스 보드 🎨</h1>' +
          '<p>반 코드를 넣고 시작하면, 학생 앱에 단계·남은 시간이 함께 표시돼요.</p>' +
          '<input id="cc" placeholder="반 코드" value="' + (classCode || "") + '" /><br/>' +
          '<div class="mins">' +
            STAGES.map(function (s, k) {
              return '<label>' + s + '<input type="number" id="d' + k + '" value="50" min="1" /></label>';
            }).join("") +
          '</div>' +
          '<button onclick="PACE.start()">▶ 수업 시작</button>' +
        '</div>';
    }

    window.PACE = {
      start: function () {
        const cc = (document.getElementById("cc").value || "").trim().toUpperCase();
        if (!cc) { alert("반 코드를 넣어주세요."); return; }
        classCode = cc;
        const durs = STAGES.map(function (_, k) { return Math.max(1, parseInt(document.getElementById("d" + k).value, 10) || 50); });
        history.replaceState(null, "", "?class=" + encodeURIComponent(cc));
        subscribe();
        startSession(durs);
      },
      go: function (d) { goStage(d); },
      pause: togglePause,
      min: adjustMin,
      end: function () { if (confirm("페이스 세션을 종료할까요?")) endSession(); }
    };

    if (classCode) subscribe();
    render();
  })();
  </script>
</body>
</html>
